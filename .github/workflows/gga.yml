name: GGA Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gga-review:
    name: GGA Code Review
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install GGA
        run: |
          git clone --depth 1 --branch v2.8.1 \
            https://github.com/Gentleman-Programming/gentleman-guardian-angel /tmp/gga
          cd /tmp/gga
          ./install.sh
          # install.sh prefers /usr/local/bin (in PATH on ubuntu-latest) but
          # may fall back to $HOME/.local/bin. Add both to PATH defensively.
          echo "/usr/local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verify GGA
        run: gga --version
      - name: Run GGA
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: gga run --pr-mode --diff-only
