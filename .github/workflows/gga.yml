name: GGA Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gga-review:
    name: GGA Code Review
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install GGA
        run: |
          brew update
          brew install gga
      - name: Run GGA
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: gga run --pr-mode --diff-only
