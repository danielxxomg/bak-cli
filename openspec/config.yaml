# openspec/config.yaml
schema: spec-driven

context: |
  Project: bak-cli
  Binary: bak
  Description: Backup and restore your OpenCode skills, MCP servers, plugins,
    agents, and AI coding configuration across machines.
  Tagline: Pack your AI coding setup. Move anywhere.
  Stack: Go 1.26+ CLI (cobra, bubbletea, go-git/v5, goreleaser)
  Repo: https://github.com/danielxxomg/bak-cli
  Architecture: CLI tool for configuration backup/restore — adapter pattern
    with Engine/Registry for OpenCode v1 (extensible to Claude, Cursor, etc.)
  Status: v0.1.0 released — active development
  Style: See AGENTS.md for full Go conventions

rules:
  proposal:
    - Include rollback plan for risky changes
    - Clarify backup scope: skills, MCP servers, plugins, agents, configs
    - Define restore semantics (overwrite vs merge)
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Consider cross-platform support (macOS, Linux, Windows)
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "go test ./..."
  verify:
    test_command: "go test ./..."
    build_command: "go build -o bak.exe ."
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner:
    name: "go test"
    command: "go test ./..."
  layers:
    unit:
      available: true
      tool: "go test"
    integration:
      available: true
      tool: "go test (internal/*/integration_test.go + git_integration_test.go)"
    e2e:
      available: false
      tool: ""
  coverage:
    available: true
    command: "go test -cover ./..."
  quality:
    linter:
      available: true
      command: "golangci-lint run"
    type_checker:
      available: true
      command: "go vet ./..."
    formatter:
      available: true
      command: "gofmt -l ."
