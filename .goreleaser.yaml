# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: bak

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: bak
    main: .
    binary: bak
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/danielxxomg/bak-cli/cmd.Version={{.Version}}
      - -X github.com/danielxxomg/bak-cli/cmd.Commit={{.Commit}}
      - -X github.com/danielxxomg/bak-cli/cmd.Date={{.Date}}

archives:
  - id: default
    formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

homebrew_casks:
  - repository:
      owner: danielxxomg
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    name: bak
    directory: Casks
    homepage: "https://github.com/danielxxomg/bak-cli"
    description: "Backup and restore your AI coding setup across machines"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/bak"]
          end

scoops:
  - repository:
      owner: danielxxomg
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/danielxxomg/bak-cli"
    description: "Backup and restore your AI coding setup across machines"
    license: "MIT"

nfpms:
  - vendor: danielxxomg
    homepage: "https://github.com/danielxxomg/bak-cli"
    maintainer: "danielxxomg"
    description: "Backup and restore your AI coding setup across machines"
    license: "MIT"
    formats:
      - deb
      - rpm
    bindir: /usr/bin
