# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.v2.jsonschema.json
version: "2"

linters:
  enable:
    - bodyclose
    - dupl
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - maintidx
    - nilerr
    - staticcheck
    - unused

  settings:
    gosec:
      excludes:
        - G301  # directory permissions (false positive for backup tool)
        - G306  # WriteFile permissions (false positive for backup tool)
        - G304  # file inclusion via variable (backup tool MUST read dynamic paths)
    maintidx:
      under: 20  # flag functions with maintainability index below 20
    dupl:
      threshold: 80  # flag duplicate code blocks with >=80 tokens

  exclusions:
    rules:
      - path: '(.+_test\.go)'
        linters:
          - errcheck
          - gosec  # tests don't need security scanning
          - maintidx  # tests may have long table-driven setups
          - dupl  # tests legitimately repeat setup patterns

run:
  timeout: 5m
  tests: true

formatters:
  enable:
    - goimports
