# yaml-language-server: $schema=https://golangci-lint.run/jsonschema/golangci.v2.jsonschema.json
version: "2"

linters:
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gocritic
    # - gosec  # temporarily disabled — too many false positives in test files
    - govet
    - ineffassign
    - nilerr
    - staticcheck
    - unused

run:
  timeout: 5m
  tests: true

issues:
  exclude-use-default: false
  exclude-rules:
    - path: _test\\.go
      linters:
        - errcheck

formatters:
  enable:
    - goimports
